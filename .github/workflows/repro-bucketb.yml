# TEMPORARY reproduction harness for bucket-B crash reports:
#   #336 — segfault indexing Icinga2 (C++) on Linux (fast mode)
#   #385 — crash indexing KiCad (C++) on Windows (moderate mode)
# Builds the current-main binaries via _build.yml, then clones each repo and
# indexes it on the originally-reported platform. A segfault/abort makes the
# index step exit non-zero and fail the job. DELETE this workflow after the run.
name: Repro Bucket B (temp)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml

  icinga2-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-linux-amd64
      - name: Extract binary
        run: |
          tar -xzf codebase-memory-mcp-linux-amd64.tar.gz
          chmod +x codebase-memory-mcp
          ./codebase-memory-mcp --version
      - name: Clone Icinga2 (issue #336)
        run: git clone --depth 1 -b v2.16.0 https://github.com/Icinga/icinga2 icinga2-repro
      - name: Index Icinga2 fast — must not segfault
        run: |
          set -o pipefail
          ./codebase-memory-mcp cli index_repository '{"repo_path":"icinga2-repro","mode":"fast"}' 2>&1 | tail -40

  kicad-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-windows-amd64
      - name: Extract binary
        shell: bash
        run: |
          unzip -o codebase-memory-mcp-windows-amd64.zip
          ./codebase-memory-mcp.exe --version
      - name: Clone KiCad (issue #385)
        shell: bash
        run: git clone --depth 1 https://gitlab.com/kicad/code/kicad kicad-repro
      - name: Index KiCad moderate — must not crash
        shell: bash
        run: |
          set -o pipefail
          ./codebase-memory-mcp.exe cli index_repository '{"repo_path":"kicad-repro","mode":"moderate","persistence":true}' 2>&1 | tail -40
